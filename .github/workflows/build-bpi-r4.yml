name: Build OpenWrt (BPI-R4)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'mediatek_filogic_DEVICE_bananapi_bpi-r4 | mediatek_filogic_DEVICE_bananapi_bpi-r4-poe | mediatek_filogic_DEVICE_bananapi_bpi-r4-lite'
        required: true
        type: string
        default: "mediatek_filogic_DEVICE_bananapi_bpi-r4-poe"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get openwrt sources
        run: |
          chmod +x ./get-openwrt-sources.sh
          ./get-openwrt-sources.sh

      - name: Free disk space on runner
        run: |
          sudo rm -rf \
            "$AGENT_TOOLSDIRECTORY" \
            /opt/ghc \
            /opt/google/chrome \
            /opt/microsoft/msedge \
            /opt/microsoft/powershell \
            /opt/pipx \
            /usr/lib/mono \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync swig unzip zlib1g-dev file wget libelf-dev ccache git

      - name: Show disk space
        run: df -h

      - name: Run builder script
        run: |
          chmod +x ./bpi-r4-openwrt-builder.sh
          ./bpi-r4-openwrt-builder.sh ${{ inputs.target }}

      - name: List built images
        if: always()
        run: |
          ls -R openwrt/bin/targets || true

      - name: Create ZIP with all images
        if: success()
        run: |
          cd openwrt/bin/targets/mediatek/filogic
          zip -r openwrt-bpi-r4-images.zip .

      - name: Set short SHA and tag
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_name=bpi-r4-commit-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifacts (latest)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-bpi-r4-images
          path: openwrt/bin/targets/mediatek/filogic/

      - name: Create or update GitHub Release (latest)
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.target }}-latest
          name: ${{ inputs.target }} manual build (latest)
          body: |
            Built from ref: ${GITHUB_SHA}
          draft: false
          prerelease: false
          files: |
            openwrt/bin/targets/mediatek/filogic/openwrt-bpi-r4-images.zip
            openwrt/bin/targets/mediatek/filogic/sha256sums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
